[vios_group]
R1 ansible_host=192.168.2.189 actual_hostname=vIOS-R1
R2 ansible_host=192.168.2.190 actual_hostname=vIOS-R2
R3 ansible_host=192.168.2.191 actual_hostname=vIOS-R3
R4 ansible_host=192.168.2.192 actual_hostname=vIOS-R4

[routers:children]
vios_group

[routers:vars]
ansible_connection=ansible.netcommon.network_cli
ansible_network_os=cisco.ios.ios
ansible_user=admin
ansible_password=admin
ansible_become=true
ansible_become_method=enable
ansible_become_password=admin

ansible_paramiko_kex_algorithms=diffie-hellman-group14-sha1