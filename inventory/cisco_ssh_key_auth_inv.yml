all:
  children:
    routers:
      vars:
        ansible_become: 'true'
        ansible_become_method: enable
        ansible_become_password: admin
        ansible_connection: ansible.netcommon.network_cli
        ansible_network_os: cisco.ios.ios
        ansible_user: admin
        ansible_password: admin
      children:
        vios_group:
          vars:
            ansible_user: ansible_admin
            ansible_private_key_file: /home/lawi/.ssh/cisco_rsa
          hosts:
            R1:
              actual_hostname: vIOS-R1
              ansible_host: 192.168.2.189
            R2:
              actual_hostname: vIOS-R2
              ansible_host: 192.168.2.190
            R3:
              actual_hostname: vIOS-R3
              ansible_host: 192.168.2.191
            R4:
              actual_hostname: vIOS-R4
              ansible_host: 192.168.2.192