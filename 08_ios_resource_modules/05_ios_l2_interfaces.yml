---
- name: Play with ios_l2_interfaces module
  hosts: switches
  gather_facts: false
  tasks:
    # - name: Gather L2 configs
    #   cisco.ios.ios_l2_interfaces:
    #     state: gathered
    #   register: l2_config

    # - name: Print result
    #   ansible.builtin.debug:
    #     msg: "{{ l2_config }}"

#### TRUNK #####

    - name: Configure TRUNK interface with allowed all VLANs
      cisco.ios.ios_l2_interfaces:
        config:
          - name: GigabitEthernet1/1
            mode: trunk
            trunk:
              allowed_vlans: 1-4094
              native_vlan: 1
              encapsulation: dot1q
        state: merged
        # tags: trunk

#### STP, BPDU, ROOTGUARD ### NOT WORKING ### Use cisco.ios.ios_config module instead.
#### This STP bpdufilter & bpduguard got issue #### Ref: https://github.com/ansible-collections/cisco.ios/issues/1285

    # - name: NOT WORKING TASK
    #   cisco.ios.ios_l2_interfaces:
    #     config:
    #       - name: GigabitEthernet1/2
    #         mode: access
    #         spanning_tree:
    #           bpdufilter:
    #             enabled: true
    #           bpduguard:
    #             enabled: true
    #     state: merged

    - name: Configure Access Port mode
      cisco.ios.ios_l2_interfaces:
        config:
          - name: GigabitEthernet1/2
            mode: access
            access:
              vlan: 10
        state: merged

    - name: Configure STP bpdufilter and bpduguard on Access Ports                                                                                                                                  
      cisco.ios.ios_config:                                                                                                                                                                         
        lines:                                                                                                                                                                                      
          - spanning-tree bpdufilter enable                                                                                                                                                         
          - spanning-tree bpduguard enable                                                                                                                                                          
        parents: interface GigabitEthernet1/2
