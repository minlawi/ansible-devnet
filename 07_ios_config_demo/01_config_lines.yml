---
- name: Playing with ios_config module
  hosts: routers
  gather_facts: no

  tasks:
    - name: Get date/time before backup
      ansible.builtin.debug:
        msg: "{{ lookup('pipe', 'date +%Y-%m-%d_%H:%M:%S') }}"
      register: date_before_backup

    - name: Backup configuration before migration
      cisco.ios.ios_config:
        backup: yes
        backup_options:
          dir_path: "./config_bkp/before_migration/{{ actual_hostname }}"
          filename: "{{ actual_hostname }}_{{ date_before_backup.msg }}.cfg"

    - name: Configure domain name
      cisco.ios.ios_config:
        lines:
          - ip domain name yourdomain.com
        save_when: modified
      register: domain_result

    - name: Get date/time after backup
      ansible.builtin.debug:
        msg: "{{ lookup('pipe', 'date +%Y-%m-%d_%H:%M:%S') }}"
      register: date_after_backup

    - name: Backup configuration after migration
      cisco.ios.ios_config:
        backup: yes
        backup_options:
          dir_path: "./config_bkp/after_migration/{{ actual_hostname }}"
          filename: "{{ actual_hostname }}_{{ date_after_backup.msg }}.cfg"
      when: domain_result.changed

    # - name: Display result of domain name configuration
    #   ansible.builtin.debug:
