---
- name: Configure nested parents with ios_config module
  hosts: routers
  gather_facts: false

  tasks:
    - name: Configure archive logging
      cisco.ios.ios_config:
        lines:
          - record rc
          - logging enable
        parents: 
          - archive
          - log config

    - name: Configure archive path
      cisco.ios.ios_config:
        lines:
          - path flash:/archive
        parents: 
          - archive