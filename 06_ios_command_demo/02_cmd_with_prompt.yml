---
- name: Play the iOS command demo
  hosts: routers
  gather_facts: no
  vars:
    specific_interfaces:
      - GigabitEthernet0/0
      - GigabitEthernet0/1
  tasks:
    # - name: Clear counters on all interfaces
    #   cisco.ios.ios_command:
    #     commands:
    #       - command: "clear counters"
    #         prompt:  'Clear "show interface" counters on all interfaces \[confirm\]'
    #         answer:  "y"

    - name: Clear counters on specific interfaces
      cisco.ios.ios_command:
        commands:
          - command: "clear counters {{ item }}"
            prompt:  'Clear "show interface" counters on this interface \[confirm\]'
            answer:  "y"
      loop: "{{ specific_interfaces }}"