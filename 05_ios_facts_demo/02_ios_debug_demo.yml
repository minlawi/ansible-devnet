---
- name: IOS debug demo
  hosts: routers
  tasks:
    - name: Gathering device uptime with ios_command module
      cisco.ios.ios_command:
        commands: show version | include uptime
      register: uptime_output

    - name: Gathering IOS facts using builtin.debug module
      ansible.builtin.debug:
        msg:
         - "Hostname     : {{ ansible_facts.net_hostname }}"
         - "Uptime       : {{ uptime_output.stdout[0] | regex_replace('.*uptime is ', '') }}"
         - "Device Image : {{ ansible_facts.net_image }}"
         - "Device SN    : {{ ansible_facts.net_serialnum }}"